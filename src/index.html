<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="transparent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus Mode">
<title>Focus Mode</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  overflow:visible;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  user-select:none;
  background: transparent;
}

/* ═══════════════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════════════ */
.card {
  position:relative; z-index:10;
  width:320px;
  border-radius:28px;
  padding:14px 20px 14px;
  background:rgba(18,14,30,0.96);
  border:1px solid rgba(255,255,255,0.08);
  display:flex; flex-direction:column;
  animation:cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  transform-origin: 50% 50%;
  flex-shrink: 0;
  will-change: transform;
  --accent:      rgba(110,0,210,0.9);
  --accent-soft: rgba(130,0,255,0.18);
  /* theme tokens — dark defaults */
  --bg:          rgba(28,28,34,0.88);
  --text:        #ffffff;
  --text-dim:    rgba(255,255,255,0.4);
  --text-mid:    rgba(255,255,255,0.75);
  --divider:     rgba(255,255,255,0.09);
  --icon-idle:   rgba(255,255,255,0.07);
  --opt-hover:   rgba(255,255,255,0.07);
  --opt-active:  rgba(255,255,255,0.09);
  --pill:        rgba(255,255,255,0.18);
  --input-bg:    rgba(255,255,255,0.08);
  --input-border:rgba(255,255,255,0.22);
  --del-bg:      rgba(255,50,50,0.18);
  --del-color:   rgba(255,110,110,0.9);
  --add-color:   rgba(255,255,255,0.28);
  --add-border:  rgba(255,255,255,0.1);
  --edit-bg:     rgba(255,255,255,0.07);
  --edit-hover:  rgba(255,255,255,0.14);
}
@keyframes cardIn{from{opacity:0;transform:scale(0.9) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}

/* ── Light mode overrides ───────────────────────────── */
.card.light {
  background:rgba(245,245,250,0.98);
  border:1px solid rgba(0,0,0,0.08);
  --text:        #111111;
  --text-dim:    rgba(0,0,0,0.35);
  --text-mid:    rgba(0,0,0,0.7);
  --divider:     rgba(0,0,0,0.08);
  --icon-idle:   rgba(0,0,0,0.06);
  --opt-hover:   rgba(0,0,0,0.05);
  --opt-active:  rgba(0,0,0,0.08);
  --pill:        rgba(0,0,0,0.15);
  --input-bg:    rgba(0,0,0,0.05);
  --input-border:rgba(0,0,0,0.18);
  --del-bg:      rgba(200,0,0,0.10);
  --del-color:   rgba(180,0,0,0.85);
  --add-color:   rgba(0,0,0,0.25);
  --add-border:  rgba(0,0,0,0.12);
  --edit-bg:     rgba(0,0,0,0.06);
  --edit-hover:  rgba(0,0,0,0.12);
}

/* ═══════════════════════════════════════════════════════
   TOP BAR  (theme toggle LEFT · minimize pill CENTER · edit RIGHT)
═══════════════════════════════════════════════════════ */
.top-bar{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; flex-shrink:0; position:relative;
}

/* ── Theme toggle switch ──── */
.theme-switch{
  width:42px; height:24px; border-radius:99px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer; position:relative;
  transition:background 0.3s, border-color 0.3s;
  flex-shrink:0;
}
.card.light .theme-switch{
  background:rgba(0,0,0,0.10);
  border-color:rgba(0,0,0,0.10);
}
.theme-switch-knob{
  position:absolute; top:3px; left:3px;
  width:16px; height:16px; border-radius:50%;
  background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.35);
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
  display:flex; align-items:center; justify-content:center;
}
.theme-switch-knob svg{width:9px;height:9px;fill:none;stroke:#888;stroke-width:1.8;stroke-linecap:round;}
.card.light .theme-switch-knob{
  transform:translateX(18px);
  background:#1a1a2e;
}
.card.light .theme-switch-knob svg{ stroke:#ccc; }
/* sun icon in dark, moon in light — toggled via JS */

/* ── Minimize pill center ─── */
.minimize-bar{
  position:absolute; left:50%; transform:translateX(-50%);
  padding:4px 10px; cursor:pointer;
}
.minimize-pill{
  width:36px; height:4px; border-radius:99px;
  background:var(--pill);
  transition:background 0.2s, width 0.2s;
}
.minimize-bar:hover .minimize-pill{ width:46px; background:rgba(150,100,255,0.55); }
.card.minimized .minimize-pill{ background:var(--accent); box-shadow:0 0 8px 2px var(--accent-soft); width:44px; }

/* ── Edit button right ───── */
.edit-toggle{
  width:30px; height:30px; border-radius:50%;
  background:var(--edit-bg); border:1px solid transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--text-dim); transition:all 0.2s ease; flex-shrink:0;
}
.edit-toggle:hover,.edit-toggle:active{ background:var(--edit-hover); color:var(--text); }
.edit-toggle.on{ background:var(--accent); color:#fff; }
.edit-toggle svg{ width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round; }

/* ═══════════════════════════════════════════════════════
   ICONS
═══════════════════════════════════════════════════════ */
.icons{ display:flex; justify-content:space-evenly; align-items:center; margin-bottom:16px; flex-shrink:0; width:100%; }
.icon-btn{
  width:50px; height:50px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:var(--icon-idle); border:1px solid transparent;
  cursor:pointer; color:var(--text-dim);
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1); flex-shrink:0;
}
.icon-btn svg{ width:22px; height:22px; fill:currentColor; }
.icon-btn:nth-child(1){--glow:rgba(255,40,100,0.5);  --glowfade:rgba(255,40,100,0.12); --ibg:rgba(215,25,75,0.9);}
.icon-btn:nth-child(2){--glow:rgba(170,0,255,0.5);   --glowfade:rgba(170,0,255,0.12);  --ibg:rgba(140,0,225,0.9);}
.icon-btn:nth-child(3){--glow:rgba(255,30,110,0.5);  --glowfade:rgba(255,30,110,0.12); --ibg:rgba(205,15,95,0.9);}
.icon-btn:nth-child(4){--glow:rgba(130,0,255,0.5);   --glowfade:rgba(130,0,255,0.12);  --ibg:rgba(110,0,210,0.9);}
.icon-btn:nth-child(5){--glow:rgba(0,210,180,0.5);   --glowfade:rgba(0,210,180,0.12);  --ibg:rgba(0,180,155,0.9);}
.icon-btn:active{ background:var(--glowfade); color:#fff; transform:scale(0.95); }
.icon-btn.active{
  background:var(--ibg); color:#fff; transform:scale(1.06);
  animation:glowPulse 2.4s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 10px 2px var(--glow),0 0 22px 4px var(--glowfade);}
  50%    {box-shadow:0 0 16px 4px var(--glow),0 0 32px 8px var(--glowfade);}
}

/* ═══════════════════════════════════════════════════════
   TITLE
═══════════════════════════════════════════════════════ */
.mode-label{ font-size:10px; font-weight:500; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:3px; flex-shrink:0; }
.title-wrap{ margin-bottom:12px; flex-shrink:0; }
.title{ font-size:28px; font-weight:700; color:var(--text); letter-spacing:-0.02em; line-height:1.1; display:inline-block; min-width:40px; border-radius:8px; transition:opacity 0.18s,transform 0.18s,color 0.3s; cursor:default; }
.title.editable{ cursor:text; }
.title.editable:hover{ background:var(--opt-hover); padding:0 5px; margin:0 -5px; }
.title.switching{ opacity:0; transform:translateY(4px); }
.title-input{ font-size:28px; font-weight:700; color:var(--text); letter-spacing:-0.02em; background:var(--input-bg); border:1px solid var(--input-border); border-radius:9px; padding:1px 9px; outline:none; width:100%; caret-color:var(--text); display:none; }

/* ═══════════════════════════════════════════════════════
   OPTIONS
═══════════════════════════════════════════════════════ */
.divider{ height:0.5px; background:var(--divider); margin-bottom:0; flex-shrink:0; }

.scroll-area{
  overflow-y:auto; overflow-x:hidden;
  padding-top:2px; padding-bottom:4px; padding-right:6px;
  height:176px; flex-shrink:0;
  scrollbar-width:none;
}
.scroll-area::-webkit-scrollbar{ width:4px; }
.scroll-area::-webkit-scrollbar-track{ background:transparent; border-radius:99px; }
.scroll-area::-webkit-scrollbar-thumb{ background:transparent; border-radius:99px; }
.scroll-area:hover{ scrollbar-width:thin; scrollbar-color:var(--accent) transparent; }
.scroll-area:hover::-webkit-scrollbar-track{ background:var(--opt-hover); }
.scroll-area:hover::-webkit-scrollbar-thumb{ background:var(--accent); box-shadow:0 0 6px 1px var(--accent-soft); }
.scroll-area:hover::-webkit-scrollbar-thumb:hover{ background:var(--text); }

.options{ list-style:none; display:flex; flex-direction:column; transition:opacity 0.18s; }
.options.switching{ opacity:0; }

.option{
  display:flex; align-items:center; gap:8px;
  padding:11px 10px; border-radius:12px;
  font-size:15px; font-weight:400; color:var(--text-mid);
  cursor:pointer; transition:background 0.15s; letter-spacing:-0.01em;
}
.option:hover{ background:var(--opt-hover); }
.option:active{ background:var(--opt-active); }
.option.selected{
  background:var(--accent-soft);
  border:1px solid transparent;
  font-weight:600; color:var(--text);
  padding:14px 10px;
}
.check{ width:15px; height:15px; flex-shrink:0; opacity:0; color:var(--accent); }
.option.selected .check{ opacity:1; }
.check svg{ width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:3.8;stroke-linecap:round;stroke-linejoin:round; }

.opt-text{ flex:1; min-width:0; }
.opt-input{ flex:1; font-size:15px; font-weight:400; color:var(--text); background:var(--input-bg); border:1px solid var(--input-border); border-radius:7px; padding:2px 7px; outline:none; caret-color:var(--text); display:none; min-width:0; }

.del-btn{ width:20px;height:20px;border-radius:50%;background:var(--del-bg);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--del-color);flex-shrink:0;font-size:14px;line-height:1;transition:background 0.15s; }
.add-btn{ display:none;align-items:center;gap:8px;padding:10px;border-radius:12px;font-size:14px;color:var(--add-color);cursor:pointer;border:1.5px dashed var(--add-border);background:transparent;width:100%;text-align:left;transition:all 0.15s;margin-top:5px; }
.add-btn svg{ width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0; }

body.editing .del-btn{ display:flex; }
body.editing .add-btn{ display:flex; }
body.editing .option{ cursor:default; }

/* Minimized */
.card.minimized .scroll-area,
.card.minimized .divider,
.card.minimized .title-wrap,
.card.minimized .mode-label{ display:none; }
.card.minimized{ padding-bottom:10px; }

/* ═══════════════════════════════════════════════════════
   RESIZE HANDLE (left side)
═══════════════════════════════════════════════════════ */
.resize-handle{
  position:absolute;
  left:-10px; top:50%; transform:translateY(-50%);
  width:10px; height:50px; border-radius:6px 0 0 6px;
  background:var(--accent);
  opacity:0.35;
  cursor:ew-resize;
  transition:opacity 0.2s, width 0.2s;
  display:flex; align-items:center; justify-content:center;
}
.resize-handle::after{
  content:'';
  width:2px; height:22px; border-radius:99px;
  background:rgba(255,255,255,0.6);
  box-shadow:4px 0 0 rgba(255,255,255,0.6);
}
.resize-handle:hover{ opacity:0.85; width:12px; }

/* ═══════════════════════════════════════════════════════
   TOP-BAR RIGHT GROUP
═══════════════════════════════════════════════════════ */
.top-bar-right{ display:flex; align-items:center; gap:5px; flex-shrink:0; }

/* ── Close button ─────────────────────────────────── */
.close-btn{
  width:30px; height:30px; border-radius:50%;
  background:var(--edit-bg); border:1px solid transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--text-dim); transition:all 0.2s ease; flex-shrink:0;
}
.close-btn:hover,.close-btn:active{ background:rgba(255,50,50,0.2); color:rgba(255,110,110,0.9); }
.close-btn svg{ width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round; }

/* ═══════════════════════════════════════════════════════
   ICON EDIT INDICATOR (dot badge in edit mode)
═══════════════════════════════════════════════════════ */
body.editing .icon-btn{ position:relative; }
body.editing .icon-btn::after{
  content:'';
  position:absolute; top:-2px; right:-2px;
  width:10px; height:10px; border-radius:50%;
  background:var(--accent);
  border:1.5px solid rgba(14,14,20,0.9);
  pointer-events:none;
  animation:dotPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
.card.light .icon-btn::after{ border-color:rgba(245,245,250,0.95); }
@keyframes dotPop{ from{transform:scale(0);} to{transform:scale(1);} }

/* ═══════════════════════════════════════════════════════
   ICON PICKER OVERLAY
═══════════════════════════════════════════════════════ */
.icon-picker{
  position:absolute; inset:0; z-index:50;
  border-radius:28px;
  background:rgba(13,11,22,0.97);
  display:none; flex-direction:column;
  padding:13px 14px 12px;
}
.icon-picker.open{
  display:flex;
  animation:pickerIn 0.22s cubic-bezier(0.34,1.3,0.64,1) both;
}
@keyframes pickerIn{ from{opacity:0;transform:scale(0.95);} to{opacity:1;transform:scale(1);} }

.picker-header{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px; flex-shrink:0;
}
.picker-title{
  font-size:10px; font-weight:600; color:rgba(255,255,255,0.35);
  letter-spacing:0.12em; text-transform:uppercase;
}
.picker-close{
  width:24px; height:24px; border-radius:50%;
  background:rgba(255,255,255,0.08); border:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,0.35); transition:all 0.15s;
}
.picker-close:hover{ background:rgba(255,50,50,0.22); color:rgba(255,110,110,0.9); }
.picker-close svg{ width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round; }

.picker-grid{
  display:grid; grid-template-columns:repeat(5,1fr); gap:5px;
  overflow-y:auto; flex:1; scrollbar-width:none;
}
.picker-grid::-webkit-scrollbar{ display:none; }

.picker-item{
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:9px 3px 7px; border-radius:10px;
  cursor:pointer; transition:background 0.15s;
  border:1px solid transparent;
}
.picker-item:hover{ background:rgba(255,255,255,0.07); }
.picker-item.current{
  background:var(--accent-soft);
  border-color:rgba(150,80,255,0.3);
}
.picker-item svg{ width:19px; height:19px; flex-shrink:0; color:rgba(255,255,255,0.85); }
.picker-item span{
  font-size:7.5px; color:rgba(255,255,255,0.3); text-align:center;
  letter-spacing:0.02em; line-height:1.2; white-space:nowrap; overflow:hidden; max-width:100%;
}

/* Light mode picker */
.card.light .icon-picker{ background:rgba(237,236,248,0.98); }
.card.light .picker-title{ color:rgba(0,0,0,0.35); }
.card.light .picker-close{ background:rgba(0,0,0,0.07); color:rgba(0,0,0,0.35); }
.card.light .picker-close:hover{ background:rgba(200,0,0,0.1); color:rgba(180,0,0,0.85); }
.card.light .picker-item:hover{ background:rgba(0,0,0,0.05); }
.card.light .picker-item svg{ color:rgba(0,0,0,0.65); }
.card.light .picker-item span{ color:rgba(0,0,0,0.35); }

/* ═══════════════════════════════════════════════════════
   UPDATE BANNER
═══════════════════════════════════════════════════════ */
.update-banner{
  position:absolute; bottom:14px; left:14px; right:14px;
  z-index:60;
  background:linear-gradient(135deg,rgba(100,40,220,0.95),rgba(180,30,80,0.95));
  border-radius:14px;
  padding:10px 14px;
  display:none; align-items:center; justify-content:space-between; gap:8px;
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  animation:pickerIn 0.3s cubic-bezier(0.34,1.3,0.64,1) both;
}
.update-banner.show{ display:flex; }
.update-banner-text{ font-size:11px; color:#fff; font-weight:500; line-height:1.4; }
.update-banner-text span{ opacity:0.7; font-size:10px; display:block; }
.update-install-btn{
  background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3);
  color:#fff; font-size:11px; font-weight:600; border-radius:8px;
  padding:5px 10px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:background 0.15s;
}
.update-install-btn:hover{ background:rgba(255,255,255,0.35); }
.update-install-btn.downloading{ opacity:0.6; pointer-events:none; }
.card.light .update-banner{ background:linear-gradient(135deg,rgba(80,20,200,0.95),rgba(160,10,60,0.95)); }
/* ── Native OS drag regions ── */
.top-bar {
  cursor: grab;
}
.top-bar:active {
  cursor: grabbing;
}
.drag-corner{
  position:absolute; bottom:0; left:0;
  width:60px; height:60px;
  border-radius:0 0 0 28px;
  z-index:20;
  cursor: grab;
}
.drag-corner:active {
  cursor: grabbing;
}
/* Interactive elements keep pointer cursor */
button, input, .option, .icon-btn, .edit-toggle, .close-btn,
.add-btn, .theme-switch, .minimize-pill, .minimize-bar,
.resize-handle, a, select {
  cursor: pointer;
}
.scroll-area { cursor: default; }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- Resize handle on the left -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- Drag handle bottom-left -->
  <div class="drag-corner" id="drag-corner"></div>

  <!-- Update banner -->
  <div class="update-banner" id="update-banner">
    <div class="update-banner-text">
      Update available
      <span id="update-version"></span>
    </div>
    <button class="update-install-btn" id="update-install-btn" onclick="installUpdate()">Install</button>
  </div>

  <!-- Top bar: theme switch | minimize pill | edit button -->
  <div class="top-bar" id="top-bar">

    <!-- Theme toggle (left) -->
    <div class="theme-switch" id="theme-switch" onclick="toggleTheme()">
      <div class="theme-switch-knob" id="theme-knob">
        <!-- sun icon (dark mode) -->
        <svg id="theme-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </div>
    </div>

    <!-- Minimize pill (center — absolute) -->
    <div class="minimize-bar" onclick="toggleMinimize()">
      <div class="minimize-pill"></div>
    </div>

    <!-- Right controls: close + edit -->
    <div class="top-bar-right">
      <button class="close-btn" id="close-btn" onclick="closeCard()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="edit-toggle" id="edit-toggle" onclick="toggleEdit()">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>

  </div>

  <!-- Icons -->
  <div class="icons">
    <button class="icon-btn" data-mode="target" onclick="handleIconClick('target',this)">

/* ─── Icon Assignments (mode → icon key) ────────────── */
let iconAssignments = {
  target:'target', candle:'candle', dollar:'dollar', sync:'shield', alerts:'bell'
};

/* ─── Picker state ──────────────────────────────────── */
let pickerTarget = null;

function handleIconClick(mode, btn){
  if(editMode) openPicker(mode, btn);
  else switchMode(mode, btn);
}

function openPicker(mode){
  pickerTarget = mode;
  const grid = document.getElementById('picker-grid');
  const current = iconAssignments[mode];
  grid.innerHTML = '';
  Object.entries(ICON_LIBRARY).forEach(([key, def]) => {
    const item = document.createElement('div');
    item.className = 'picker-item' + (key === current ? ' current' : '');
    item.innerHTML = def.svg + `<span>${def.label}</span>`;
    item.addEventListener('click', () => assignIcon(mode, key));
    grid.appendChild(item);
  });
  document.getElementById('icon-picker').classList.add('open');
}

function closePicker(){
  document.getElementById('icon-picker').classList.remove('open');
  pickerTarget = null;
}

function assignIcon(mode, iconKey){
  iconAssignments[mode] = iconKey;
  const btn = document.querySelector(`.icon-btn[data-mode="${mode}"]`);
  if(btn) btn.innerHTML = ICON_LIBRARY[iconKey].svg;
  if(window._afterRender) window._afterRender();
  closePicker();
  autoSave();
}

function initIcons(){
  Object.entries(iconAssignments).forEach(([mode, iconKey]) => {
    const btn = document.querySelector(`.icon-btn[data-mode="${mode}"]`);
    if(btn && ICON_LIBRARY[iconKey]) btn.innerHTML = ICON_LIBRARY[iconKey].svg;
  });
}

/* ─── Close card ────────────────────────────────────── */
function closeCard(){
  if (window.electronAPI) {
    window.electronAPI.closeApp();
    return;
  }
  const card = document.getElementById('card');
  card.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
  card.style.opacity    = '0';
  card.style.transform  = 'scale(0.88)';
  setTimeout(() => card.style.display = 'none', 290);
}

  target:{title:'Precision',      accent:'rgba(215,25,75,0.9)',  soft:'rgba(255,40,100,0.16)',  options:['Scalping session','Sniper entry only','Wait for confluence','HTF confirmation']},
  candle:{title:'Analysis',       accent:'rgba(140,0,225,0.9)',  soft:'rgba(170,0,255,0.16)',   options:['1H candlestick review','4H structure check','Daily bias','Weekly trend']},
  dollar:{title:'Risk & P&L',     accent:'rgba(205,15,95,0.9)',  soft:'rgba(255,30,110,0.16)',  options:['1% risk per trade','Review open P&L','Set daily loss limit','Check margin level']},
  sync:  {title:'Do Not Disturb', accent:'rgba(110,0,210,0.9)',  soft:'rgba(130,0,255,0.16)',   options:['For an hour','For Today','Until This Weekend','Until Goals Met']},

/* ─── Accent ─────────────────────────────────────────── */
function applyAccent(mode){
  const c=document.getElementById('card');
  c.style.setProperty('--accent',      MODES[mode].accent);
  c.style.setProperty('--accent-soft', MODES[mode].soft);
}

const MOON_SVG= `<svg id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

function toggleTheme(){
  isLight = !isLight;
  const card = document.getElementById('card');
  const knob = document.getElementById('theme-knob');
  card.classList.toggle('light', isLight);
  knob.innerHTML = isLight ? MOON_SVG : SUN_SVG;
  const r = window._cardRatio || 1;
  knob.style.transform = isLight ? `translateX(${18*r}px)` : 'translateX(0)';
  autoSave();
}

/* ─── Minimize ───────────────────────────────────────── */
function toggleMinimize(){
  const card=document.getElementById('card');
  card.classList.toggle('minimized');
  if(card.classList.contains('minimized') && editMode) toggleEdit();
  // Tell main the new card size so hit-poll updates immediately
  setTimeout(() => {
    if (window.electronAPI) {
      const r = card.getBoundingClientRect();
      window.electronAPI.cardBounds({ x: r.left, y: r.top, w: r.width, h: r.height });
    }
  }, 320); // after CSS transition
}

/* ─── Edit ───────────────────────────────────────────── */
function toggleEdit(){
  const card = document.getElementById('card');
  // Auto-expand if minimized before entering edit mode
  if(!editMode && card.classList.contains('minimized')){
    card.classList.remove('minimized');
  }
  editMode=!editMode;
  document.body.classList.toggle('editing',editMode);
  const btn=document.getElementById('edit-toggle');
  btn.classList.toggle('on',editMode);
  btn.innerHTML=editMode
    ?`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
    :`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  document.getElementById('mode-title').classList.toggle('editable',editMode);
  renderOptions(currentMode); commitTitle();
}

/* ─── Title editing ──────────────────────────────────── */
document.getElementById('mode-title').addEventListener('click',()=>{
  if(!editMode)return;
  const h1=document.getElementById('mode-title'),inp=document.getElementById('title-input');
  inp.value=MODES[currentMode].title; h1.style.display='none'; inp.style.display='block'; inp.focus(); inp.select();
});
function commitTitle(){
  const h1=document.getElementById('mode-title'),inp=document.getElementById('title-input');
  if(!inp.style.display||inp.style.display==='none')return;
  const val=inp.value.trim()||MODES[currentMode].title;
  MODES[currentMode].title=val; h1.textContent=val; h1.style.display=''; inp.style.display='none';
}

/* ─── Options ────────────────────────────────────────── */
function checkHTML(){return`<span class="check"><svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg></span>`;}

function renderOptions(mode, forceIdx){
  const list=document.getElementById('options-list');
  const prev=list.querySelector('.option.selected');
  const prevIdx = forceIdx !== undefined ? forceIdx
    : prev ? [...list.children].indexOf(prev)
    : Math.min(3,MODES[mode].options.length-1);
  list.innerHTML='';
  MODES[mode].options.forEach((text,i)=>{
    const li=document.createElement('li');
    li.className='option'+(i===prevIdx?' selected':'');
    const del=document.createElement('button');
    del.className='del-btn'; del.textContent='×';
    del.addEventListener('click',e=>{e.stopPropagation();if(MODES[currentMode].options.length>1){MODES[currentMode].options.splice(i,1);renderOptions(currentMode);}});
    const span=document.createElement('span'); span.className='opt-text'; span.textContent=text;
    const inp=document.createElement('input'); inp.className='opt-input'; inp.type='text'; inp.value=text;
    inp.addEventListener('blur',()=>{const v=inp.value.trim()||MODES[currentMode].options[i];MODES[currentMode].options[i]=v;span.textContent=v;span.style.display='';inp.style.display='none';});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
    li.appendChild(document.createRange().createContextualFragment(checkHTML()));
    li.appendChild(span); li.appendChild(inp); li.appendChild(del);
    li.addEventListener('click',e=>{
      if(e.target===del)return;
      if(editMode){span.style.display='none';inp.style.display='block';inp.focus();inp.select();}
      else{document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));li.classList.add('selected');}
    });
    list.appendChild(li);
  });
  // re-apply current scale to newly created elements
  if(window._afterRender) window._afterRender();
}

function addOption(){
  MODES[currentMode].options.push('New option'); renderOptions(currentMode);
  const items=document.querySelectorAll('#options-list .option');
  const last=items[items.length-1];
  if(last){const s=last.querySelector('.opt-text'),i=last.querySelector('.opt-input');s.style.display='none';i.style.display='block';i.focus();i.select();last.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

/* ─── Mode switch ────────────────────────────────────── */
function switchMode(mode,btn){
  // save selected index for current mode before switching
  const sel=document.querySelector('#options-list .option.selected');
  if(sel){const idx=[...document.querySelectorAll('#options-list .option')].indexOf(sel);localStorage.setItem('fm_sel_'+currentMode,idx);}
  if(editMode)toggleEdit(); commitTitle(); currentMode=mode;
  document.querySelectorAll('.icon-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  applyAccent(mode);
  const t=document.getElementById('mode-title'),l=document.getElementById('options-list');
  t.classList.add('switching'); l.classList.add('switching');
  setTimeout(()=>{t.textContent=MODES[mode].title;renderOptions(mode);t.classList.remove('switching');l.classList.remove('switching');},180);
}

/* ─── Scale handle — pure CSS zoom, window never resizes ─ */
(function(){
  const handle = document.getElementById('resize-handle');
  const card   = document.getElementById('card');
  const MIN_S  = 0.6, MAX_S = 1.8;
  let dragging = false, startX = 0, startS = 1, animCleared = false;

  window._cardScale   = 1;
  window._afterRender = function(){};

  function clearAnim(){
    if(animCleared) return;
    animCleared = true;
    card.style.animation = 'none';
  }

  function applyZoom(s){
    s = Math.min(MAX_S, Math.max(MIN_S, +s.toFixed(4)));
    window._cardScale = s;
    card.style.zoom = s;
    localStorage.setItem('fm_scale', s);
  }

  window._applyScale = applyZoom;

  card.addEventListener('animationend', () => {
    clearAnim();
    try {
      const saved = parseFloat(localStorage.getItem('fm_scale'));
      if (saved >= MIN_S && saved <= MAX_S) applyZoom(saved);
    } catch(e){}
  }, {once: true});

  function beginDrag(screenX){
    clearAnim();
    dragging = true;
    startX   = screenX;
    startS   = parseFloat(card.style.zoom) || 1;
    document.body.style.userSelect = 'none';
  }
  function moveDrag(screenX){
    if(!dragging) return;
    applyZoom(startS + (startX - screenX) / 300);
  }
  function endDrag(){
    if(!dragging) return;
    dragging = false;
    document.body.style.userSelect = '';
  }

  handle.addEventListener('mousedown',  e => { beginDrag(e.screenX); e.preventDefault(); });
  document.addEventListener('mousemove', e => moveDrag(e.screenX));
  document.addEventListener('mouseup',   endDrag);
  handle.addEventListener('touchstart', e => { beginDrag(e.touches[0].screenX); e.preventDefault(); }, {passive:false});
  document.addEventListener('touchmove', e => { if(!dragging) return; moveDrag(e.touches[0].screenX); e.preventDefault(); }, {passive:false});
  document.addEventListener('touchend', endDrag);
})();

/* ─── Click-through transparent areas ───────────────── */
// Forward mouse events through transparent parts of the window,
// only capture when cursor is actually over the card.
if (window.electronAPI) {
  const card = document.getElementById('card');
  document.addEventListener('mousemove', e => {
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const overCard = el && (el === card || card.contains(el));
    window.electronAPI.setIgnoreMouseEvents(!overCard);
  });
}

/* ─── Card bounds reporting — main process polls cursor against these ── */
(function(){
  if (!window.electronAPI) return;
  const card = document.getElementById('card');
  if (!card) return;

  function sendBounds() {
    const r = card.getBoundingClientRect();
    window.electronAPI.cardBounds({ x: r.left, y: r.top, w: r.width, h: r.height });
  }

  // Send on load and whenever card changes
  sendBounds();
  new ResizeObserver(sendBounds).observe(card);
  new MutationObserver(sendBounds).observe(card, { attributes: true, attributeFilter: ['class'] });
  window.addEventListener('resize', sendBounds);
})();

/* ─── Drag to move (top-bar + corner) ───────────────── */
let isDraggingWindow = false;
(function(){
  const topBar = document.getElementById('top-bar');
  const corner = document.getElementById('drag-corner');

  function startDrag(sx, sy, target) {
    if (target && target.closest('button,input,.theme-switch,.minimize-bar,.top-bar-right')) return;
    isDraggingWindow = true;
    document.body.style.cursor = 'grabbing';
    document.body.style.userSelect = 'none';
    if (window.electronAPI) window.electronAPI.dragStart(sx, sy);
  }
  function moveDrag(sx, sy) {
    if (!isDraggingWindow) return;
    if (window.electronAPI) window.electronAPI.dragMove(sx, sy);
  }
  function endDrag() {
    if (!isDraggingWindow) return;
    isDraggingWindow = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    if (window.electronAPI) window.electronAPI.dragEnd();
  }

  if (topBar)
    topBar.addEventListener('mousedown', e => startDrag(e.screenX, e.screenY, e.target));
  if (corner)
    corner.addEventListener('mousedown', e => { startDrag(e.screenX, e.screenY, null); e.preventDefault(); });

  document.addEventListener('mousemove', e => moveDrag(e.screenX, e.screenY));
  document.addEventListener('mouseup',   endDrag);
})();

/* ─── Auto-updater UI ───────────────────────────────── */
function installUpdate(){
  const btn = document.getElementById('update-install-btn');
  btn.textContent = 'Installing…';
  btn.classList.add('downloading');
  if (window.electronAPI) window.electronAPI.installUpdate();
}

if (window.electronAPI) {
  window.electronAPI.onUpdateAvailable((version) => {
    const banner = document.getElementById('update-banner');
    const vEl    = document.getElementById('update-version');
    if (vEl) vEl.textContent = `v${version} — downloading…`;
    if (banner) banner.classList.add('show');
  });
  window.electronAPI.onUpdateDownloaded(() => {
    const btn = document.getElementById('update-install-btn');
    const vEl = document.getElementById('update-version');
    if (btn) btn.textContent = 'Restart & Install';
    if (vEl) vEl.textContent = 'Ready to install';
  });
}
/* ─── Persistence ────────────────────────────────────── */
function saveState(){
  localStorage.setItem('fm_modes',       JSON.stringify(MODES));
  localStorage.setItem('fm_mode',        currentMode);
  localStorage.setItem('fm_theme',       isLight ? '1' : '0');
  localStorage.setItem('fm_width',       document.getElementById('card').offsetWidth);
  localStorage.setItem('fm_icons',       JSON.stringify(iconAssignments));
  // save selected index per mode
  const sel = document.querySelector('#options-list .option.selected');
  const idx = sel ? [...document.querySelectorAll('#options-list .option')].indexOf(sel) : 0;
  localStorage.setItem('fm_sel_'+currentMode, idx);
}

function loadState(){
  try{
    const saved = localStorage.getItem('fm_modes');
    if(saved){
      const parsed = JSON.parse(saved);
      // only restore titles + options, never accent/soft (keep hardcoded colors)
      Object.keys(parsed).forEach(k=>{
        if(MODES[k]){
          if(parsed[k].title)   MODES[k].title   = parsed[k].title;
          if(parsed[k].options) MODES[k].options = parsed[k].options;
        }
      });
    }
  } catch(e){}
  const mode = localStorage.getItem('fm_mode');
  if(mode && MODES[mode]) currentMode = mode;
  isLight = localStorage.getItem('fm_theme') === '1';
  try{
    const savedIcons = localStorage.getItem('fm_icons');
    if(savedIcons) iconAssignments = {...iconAssignments, ...JSON.parse(savedIcons)};
  }catch(e){}
}

// Auto-save on any meaningful action
function autoSave(){ requestAnimationFrame(saveState); }

/* ─── Init ───────────────────────────────────────────── */
// Clear stale accent data from older saves
try{ const s=localStorage.getItem('fm_modes'); if(s&&JSON.parse(s)?.alerts?.accent?.includes('220,90')) localStorage.removeItem('fm_modes'); }catch(e){}
loadState();

// Restore theme
if(isLight){
  document.getElementById('card').classList.add('light');
  document.getElementById('theme-knob').innerHTML = `<svg id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
}

// Restore icons from saved assignments
initIcons();

// Restore active icon button
document.querySelectorAll('.icon-btn').forEach(b=>{
  b.classList.toggle('active', b.dataset.mode === currentMode);
});

// Restore title
document.getElementById('mode-title').textContent = MODES[currentMode].title;

// Restore selected option index
const savedIdx = parseInt(localStorage.getItem('fm_sel_'+currentMode)) || Math.min(3, MODES[currentMode].options.length-1);
renderOptions(currentMode, savedIdx);
applyAccent(currentMode);

// Restore card width
const savedW = parseInt(localStorage.getItem('fm_width'));
if(savedW && savedW >= 220 && savedW <= 520){
  // defer so DOM is ready
  setTimeout(()=>{ if(window._afterRender) window._afterRender(); }, 50);
}

// Hook auto-save into user actions
document.addEventListener('click',    autoSave);
document.addEventListener('touchend', autoSave);

if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
